<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Darśana</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#f0e8d8,#e8dcc8 50%,#f4ede0);
    display:flex;align-items:center;justify-content:center;
    font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;padding:12px;color:#3a2a18}
  #app{width:100%;max-width:720px;height:94vh;display:flex;flex-direction:column;
    background:#fdfaf5;border-radius:20px;border:1px solid rgba(180,130,60,0.25);overflow:hidden;
    box-shadow:0 8px 40px rgba(120,80,20,0.12),0 2px 8px rgba(120,80,20,0.08)}
  #header{padding:14px 20px 11px;border-bottom:1px solid rgba(180,130,60,0.15);
    background:linear-gradient(180deg,#fff8ee,#fdfaf5);flex-shrink:0}
  #title-row{display:flex;align-items:center;gap:11px;margin-bottom:11px}
  #om-wrap{position:relative;width:38px;height:38px;flex-shrink:0}
  #om-ring{position:absolute;inset:0;background:conic-gradient(from 0deg,#c8902a,#7850b8,#b03050,#c87020,#3878b8,#3a9870,#c8902a);
    border-radius:50%;animation:spin 24s linear infinite}
  #om-inner{position:absolute;inset:2px;background:#fff8ee;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:#b8782a}
  #title-text{flex:1}
  #title-text h1{color:#7a4818;font-size:17px;font-weight:700;letter-spacing:0.12em;font-variant:small-caps}
  #title-text p{color:#a08060;font-size:9.5px;letter-spacing:0.07em;font-style:italic;margin-top:2px}
  #mode-toggle{display:flex;background:#f0e8d8;border-radius:20px;border:1px solid rgba(180,130,60,0.3);overflow:hidden}
  .mode-btn{padding:5px 12px;border:none;cursor:pointer;font-size:10px;font-family:Palatino,serif;
    background:transparent;color:#a08060;transition:all 0.25s}
  .mode-btn.active{background:#c8902a;color:#fff;font-weight:600}
  #tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center}
  #tabs::-webkit-scrollbar{display:none}
  .tab-label{color:#c0a080;font-size:9px;letter-spacing:0.1em;white-space:nowrap;margin-right:3px;text-transform:uppercase}
  .tab-btn{padding:4px 11px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);
    background:#fff8ee;color:#a08060;font-size:10px;font-family:Palatino,serif;
    cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.25s}
  .tab-btn:hover{background:#f0e0c0;color:#7a4818}
  .tab-btn.active{color:#fff;font-weight:600}
  #key-banner{padding:10px 20px;background:#fff8ee;border-bottom:2px solid #c8902a;
    display:flex;align-items:center;gap:9px;flex-shrink:0}
  #key-banner-label{color:#b8782a;font-size:12px;white-space:nowrap;flex-shrink:0;font-weight:bold}
  #key-input{flex:1;background:#fff;border:1px solid #d4a860;border-radius:9px;
    padding:7px 12px;color:#5a3818;font-size:12px;font-family:Palatino,serif;outline:none;
    transition:all 0.2s;letter-spacing:0.04em}
  #key-input::placeholder{color:#c0a070;font-style:italic}
  #key-input:focus{border-color:#c8902a;box-shadow:0 0 0 2px rgba(200,144,42,0.15)}
  #key-save{padding:6px 14px;border-radius:9px;border:none;background:#c8902a;color:#fff;
    cursor:pointer;font-size:12px;font-weight:bold;font-family:Palatino,serif;
    white-space:nowrap;transition:all 0.2s;flex-shrink:0}
  #key-save:hover{background:#a87020}
  #key-status{font-size:11px;white-space:nowrap;flex-shrink:0;min-width:90px;text-align:right}
  #inquiry-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;
    gap:14px;min-height:0;scrollbar-width:thin;scrollbar-color:#d4b880 transparent}
  #inquiry-body::-webkit-scrollbar{width:4px}
  #inquiry-body::-webkit-scrollbar-thumb{background:#d4b880;border-radius:4px}
  .filter-banner{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:10px}
  .filter-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
  .filter-x{background:none;border:none;color:#c0a080;cursor:pointer;font-size:14px;margin-left:auto}
  .quote-box{text-align:center;padding:16px 18px;border-radius:14px}
  .quote-star{font-size:20px;opacity:0.5;margin-bottom:8px}
  .quote-text{font-size:14px;font-style:italic;line-height:1.75}
  .quote-src{font-size:11px;color:#a08060;margin-top:8px}
  .section-label{color:#c0a080;font-size:9px;letter-spacing:0.14em;text-align:center;text-transform:uppercase}
  .starter-btn{width:100%;background:#fff8ee;border:1px solid rgba(180,130,60,0.2);border-radius:10px;
    padding:9px 14px;color:#7a5838;font-size:13px;font-family:Palatino,serif;cursor:pointer;
    text-align:left;font-style:italic;line-height:1.5;transition:all 0.25s;margin-bottom:5px;display:block}
  .starter-btn:hover{background:#f0e0c0;border-color:rgba(180,130,60,0.5);color:#5a3010}
  .msg-row{display:flex;gap:8px;align-items:flex-start;animation:fadeUp 0.3s ease}
  .msg-row.user{justify-content:flex-end}
  .msg-avatar{width:24px;height:24px;border-radius:50%;background:conic-gradient(from 0deg,#c8902a,#7850b8,#b03050,#c87020,#3878b8,#3a9870,#c8902a);
    flex-shrink:0;margin-top:3px;position:relative}
  .msg-avatar-inner{position:absolute;inset:2px;background:#fff8ee;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:8px;color:#b8782a}
  .msg-bubble{max-width:100%;padding:11px 16px;font-size:13.5px;line-height:1.8;white-space:pre-wrap}
  .msg-bubble.assistant{background:#fff;border:1px solid rgba(180,130,60,0.18);
    color:#3a2818;border-radius:4px 15px 15px 15px;box-shadow:0 1px 4px rgba(120,80,20,0.06)}
  .msg-bubble.user{background:linear-gradient(135deg,#f5e8c8,#ecdbb0);border:1px solid rgba(180,130,60,0.3);
    color:#5a3818;border-radius:15px 15px 4px 15px}
  .msg-bubble-wrap{display:flex;flex-direction:column;gap:5px;max-width:82%}
  .speak-btn{align-self:flex-start;background:#fff8ee;border:1px solid rgba(180,130,60,0.25);
    border-radius:20px;padding:3px 10px;font-size:10px;color:#a08060;cursor:pointer;
    font-family:Palatino,serif;transition:all 0.2s}
  .speak-btn:hover{background:#f0e0c0;color:#7a4818;border-color:rgba(180,130,60,0.5)}
  .speak-btn.speaking{background:#c8902a;color:#fff;border-color:#c8902a}
  .typing{padding:11px 16px;background:#fff;border:1px solid rgba(180,130,60,0.18);
    border-radius:4px 15px 15px 15px;display:flex;gap:6px;align-items:center;
    box-shadow:0 1px 4px rgba(120,80,20,0.06)}
  .dot{width:5px;height:5px;border-radius:50%;animation:bounce 1.3s ease infinite;opacity:0.6}
  #inquiry-input{padding:10px 16px 13px;border-top:1px solid rgba(180,130,60,0.12);
    background:#fff8ee;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
  #msg-input{flex:1;background:#fff;border:1px solid rgba(180,130,60,0.3);
    border-radius:11px;padding:10px 13px;color:#3a2818;font-size:13.5px;font-family:Palatino,serif;
    font-style:italic;resize:none;outline:none;line-height:1.5;transition:all 0.2s}
  #msg-input::placeholder{color:#c0a070;font-style:italic}
  #msg-input:focus{border-color:#c8902a;box-shadow:0 0 0 2px rgba(200,144,42,0.12)}
  #send-btn{width:38px;height:38px;border-radius:11px;border:none;flex-shrink:0;
    cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;color:#fff;background:#c0b090}
  #med-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;
    gap:14px;min-height:0;scrollbar-width:thin;scrollbar-color:#d4b880 transparent}
  #med-body::-webkit-scrollbar{width:4px}
  #med-body::-webkit-scrollbar-thumb{background:#d4b880;border-radius:4px}
  .level-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .level-btn{padding:11px 13px;border-radius:12px;border:1px solid rgba(180,130,60,0.2);
    background:#fff8ee;cursor:pointer;text-align:left;font-family:Palatino,serif;
    transition:all 0.3s;box-shadow:0 1px 3px rgba(120,80,20,0.05)}
  .level-btn:hover{background:#f5ead8;transform:translateY(-1px);box-shadow:0 3px 10px rgba(120,80,20,0.1)}
  .level-icon{font-size:13px}
  .level-name{font-size:11px;font-weight:600}
  .level-desc{font-size:9.5px;line-height:1.5;font-style:italic;color:#a08060;margin-top:3px}
  .lens-banner{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:10px;font-size:11px}
  #timer-row{display:flex;align-items:center;gap:6px;padding:10px 0 2px}
  #timer-label{color:#a08060;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;margin-right:2px}
  .timer-btn{padding:4px 12px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);
    background:#fff8ee;color:#a08060;font-size:11px;font-family:Palatino,serif;cursor:pointer;transition:all 0.25s}
  .timer-btn:hover{background:#f0e0c0;color:#7a4818}
  .timer-btn.active{color:#fff;font-weight:600}
  #timer-display{margin-left:auto;font-size:14px;font-weight:700;min-width:45px;text-align:right;display:none;font-variant-numeric:tabular-nums}
  #gen-btn{padding:12px;border-radius:13px;font-size:13px;font-family:Palatino,serif;font-style:italic;
    letter-spacing:0.05em;display:flex;align-items:center;justify-content:center;gap:9px;
    transition:all 0.25s;cursor:pointer;border:1px solid rgba(180,130,60,0.3)}
  #gen-btn:hover{transform:translateY(-1px)}
  #med-result{border-radius:14px;background:#fff;border:1px solid rgba(180,130,60,0.2);
    padding:15px 17px;display:none;box-shadow:0 2px 8px rgba(120,80,20,0.06)}
  #med-result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  #begin-btn{padding:6px 16px;border-radius:20px;font-size:11px;font-family:Palatino,serif;
    letter-spacing:0.06em;display:flex;align-items:center;gap:5px;cursor:pointer;
    transition:all 0.2s;border:none;color:#fff;font-weight:600}
  #med-text-preview{font-size:12.5px;line-height:1.9;font-style:italic;color:#7a6050;
    max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#d4b880 transparent}
  #breath-section{display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0;display:none}
  #breath-circle{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  #breath-label{font-size:11px;font-style:italic;font-weight:600}
  .silence-quote{text-align:center;color:#b09070;font-size:11px;font-style:italic;line-height:1.9}
  .speech-controls{display:flex;gap:8px}
  .speech-btn{padding:6px 16px;border-radius:20px;font-size:11px;font-family:Palatino,serif;
    letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;font-weight:600}
  .speech-btn:hover{transform:translateY(-1px)}
  #footer{padding:5px 18px;border-top:1px solid rgba(180,130,60,0.1);display:flex;gap:12px;
    overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:#fff8ee}
  #footer::-webkit-scrollbar{display:none}
  .foot-item{display:flex;align-items:center;gap:4px;white-space:nowrap;opacity:0.55}
  .foot-dot{width:4px;height:4px;border-radius:50%}
  .foot-label{font-size:9px}
  .fade-in{animation:fadeIn 0.35s ease}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
  @keyframes breathIn{from{transform:scale(1);opacity:0.6}to{transform:scale(1.38);opacity:1}}
  @keyframes breathOut{from{transform:scale(1.38);opacity:1}to{transform:scale(0.85);opacity:0.5}}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title-row">
      <div id="om-wrap"><div id="om-ring"></div><div id="om-inner">ॐ</div></div>
      <div id="title-text">
        <h1>Darśana</h1>
        <p>Iyengar · Kashmir Shaivism · Patañjali · Siddha Yoga™ · Vijñāna Bhairava</p>
      </div>
      <div id="mode-toggle">
        <button class="mode-btn active" data-mode="inquiry" onclick="setMode('inquiry')">◈ Inquiry</button>
        <button class="mode-btn" data-mode="meditation" onclick="setMode('meditation')">◉ Meditation</button>
      </div>
    </div>
    <div id="tabs"></div>
  </div>

  <div id="key-banner">
    <span id="key-banner-label">🔑 API Key</span>
    <input id="key-input" type="password" placeholder="Paste your Anthropic key (sk-ant-…)" autocomplete="off" spellcheck="false"/>
    <button id="key-save" onclick="saveKey()">Save</button>
    <span id="key-status" style="color:#c06040">no key</span>
  </div>

  <div id="oai-banner" style="padding:8px 20px;background:#f5f0ff;border-bottom:1px solid rgba(120,80,200,0.2);display:flex;align-items:center;gap:9px;flex-shrink:0">
    <span style="color:#7850b8;font-size:12px;white-space:nowrap;flex-shrink:0;font-weight:bold">🎙 OpenAI Voice</span>
    <input id="oai-key-input" type="password" placeholder="Paste OpenAI key (sk-…) for neural voice"
      autocomplete="off" spellcheck="false"
      style="flex:1;background:#fff;border:1px solid rgba(120,80,200,0.35);border-radius:9px;
        padding:6px 12px;color:#3a1870;font-size:12px;font-family:Palatino,serif;outline:none;transition:all 0.2s"/>
    <button onclick="saveOaiKey()"
      style="padding:5px 13px;border-radius:9px;border:none;background:#7850b8;color:#fff;
        cursor:pointer;font-size:12px;font-weight:bold;font-family:Palatino,serif;white-space:nowrap;flex-shrink:0">Save</button>
    <span id="oai-key-status" style="font-size:11px;white-space:nowrap;flex-shrink:0;color:#c06040;min-width:70px;text-align:right">no key</span>
  </div>

  <!-- Voice selector -->
  <div id="voice-bar" style="padding:7px 20px;background:#faf8ff;border-bottom:1px solid rgba(120,80,200,0.12);display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap">
    <span style="color:#9070c0;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap">Voice</span>
    <button class="voice-btn" data-voice="nova"    onclick="setTtsVoice('nova')"    style="padding:3px 10px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#c8902a;color:#fff;font-size:10px;font-family:Palatino,serif;cursor:pointer;transition:all 0.2s;font-weight:600">Nova ✦</button>
    <button class="voice-btn" data-voice="shimmer" onclick="setTtsVoice('shimmer')" style="padding:3px 10px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#fff8ee;color:#a08060;font-size:10px;font-family:Palatino,serif;cursor:pointer;transition:all 0.2s">Shimmer</button>
    <button class="voice-btn" data-voice="alloy"   onclick="setTtsVoice('alloy')"   style="padding:3px 10px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#fff8ee;color:#a08060;font-size:10px;font-family:Palatino,serif;cursor:pointer;transition:all 0.2s">Alloy</button>
    <button class="voice-btn" data-voice="echo"    onclick="setTtsVoice('echo')"    style="padding:3px 10px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#fff8ee;color:#a08060;font-size:10px;font-family:Palatino,serif;cursor:pointer;transition:all 0.2s">Echo</button>
    <button class="voice-btn" data-voice="onyx"    onclick="setTtsVoice('onyx')"    style="padding:3px 10px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#fff8ee;color:#a08060;font-size:10px;font-family:Palatino,serif;cursor:pointer;transition:all 0.2s">Onyx</button>
    <button class="voice-btn" data-voice="fable"   onclick="setTtsVoice('fable')"   style="padding:3px 10px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#fff8ee;color:#a08060;font-size:10px;font-family:Palatino,serif;cursor:pointer;transition:all 0.2s">Fable</button>
    <div style="display:flex;align-items:center;gap:6px;margin-left:4px">
      <span style="color:#9070c0;font-size:9px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap">Speed</span>
      <input type="range" min="0.7" max="1.0" step="0.01" value="0.88" oninput="setTtsSpeed(this.value)"
        style="width:70px;accent-color:#7850b8;cursor:pointer"/>
      <span id="speed-label" style="color:#9070c0;font-size:10px;min-width:32px">0.88×</span>
    </div>
  </div>

  <div id="inquiry-panel" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden">
    <div id="inquiry-body"></div>
    <div id="inquiry-input">
      <textarea id="msg-input" rows="1" placeholder="Bring your inquiry to Darśana…"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';updateSendBtn()"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button id="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>

  <div id="med-panel" style="display:none;flex:1;min-height:0;overflow:hidden">
    <div id="med-body">
      <div id="breath-section">
        <div id="breath-circle"><span id="breath-label">inhale</span></div>
        <div id="timer-display"></div>
        <div class="silence-quote">"The silence between words<br/>is as important as the words."</div>
        <div class="speech-controls">
          <button class="speech-btn" id="pause-btn" onclick="togglePause()">⏸ Pause</button>
          <button class="speech-btn" onclick="stopSpeech()" style="border:1px solid rgba(180,60,60,0.4);background:#fff5f5;color:#b04040">◼ Stop</button>
        </div>
      </div>
      <div id="med-config">
        <div class="section-label" style="text-align:left;margin-bottom:9px">Practice Level</div>
        <div class="level-grid" id="level-grid"></div>
        <div id="timer-row">
          <span id="timer-label">Session</span>
          <button class="timer-btn active" data-mins="0" onclick="setTimer(0)">Free</button>
          <button class="timer-btn" data-mins="5" onclick="setTimer(5)">5 min</button>
          <button class="timer-btn" data-mins="10" onclick="setTimer(10)">10 min</button>
          <button class="timer-btn" data-mins="20" onclick="setTimer(20)">20 min</button>
        </div>
        <div id="lens-banner" class="lens-banner" style="display:none"></div>

        <!-- DRONE SOUND -->
        <div id="drone-section" style="margin-top:12px;padding:12px 14px;border-radius:12px;background:#fff8ee;border:1px solid rgba(180,130,60,0.18)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
            <span style="color:#8a6848;font-size:10px;letter-spacing:0.1em;text-transform:uppercase">Background Sound</span>
            <button id="drone-toggle-btn" onclick="toggleDrone()"
              style="padding:4px 13px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#fff8ee;color:#a08060;font-size:11px;font-family:Palatino,serif;cursor:pointer;transition:all 0.25s;font-weight:600">♪ Start Drone</button>
          </div>
          <div style="display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap">
            <button class="drone-type-btn" data-type="tambura" onclick="setDroneType('tambura')"
              style="padding:4px 11px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#c8902a;color:#fff;font-size:10px;font-family:Palatino,serif;cursor:pointer;transition:all 0.25s;font-weight:600">Tambura</button>
            <button class="drone-type-btn" data-type="bowl" onclick="setDroneType('bowl')"
              style="padding:4px 11px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#fff8ee;color:#a08060;font-size:10px;font-family:Palatino,serif;cursor:pointer;transition:all 0.25s">Singing Bowl</button>
            <button class="drone-type-btn" data-type="nada" onclick="setDroneType('nada')"
              style="padding:4px 11px;border-radius:20px;border:1px solid rgba(180,130,60,0.25);background:#fff8ee;color:#a08060;font-size:10px;font-family:Palatino,serif;cursor:pointer;transition:all 0.25s">Nada</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="color:#c0a080;font-size:9px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap">Volume</span>
            <input type="range" min="0" max="0.4" step="0.01" value="0.18"
              oninput="setDroneVol(this.value)"
              style="flex:1;accent-color:#c8902a;cursor:pointer"/>
            <span id="drone-vol-label" style="color:#a08060;font-size:10px;min-width:30px;text-align:right">45%</span>
          </div>
        </div>
        <button id="gen-btn" onclick="genMeditation()" style="margin-top:12px">
          <span id="gen-icon">◑</span><span id="gen-label">Generate Moderate Guidance</span>
        </button>
        <div id="med-result">

function applySanskrit(t){for(const [p,r] of SANSKRIT_MAP)t=t.replace(p,r);return t;}

function cleanForSpeech(text){
  let t=text
    .replace(/#{1,6}\s+/g,"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1")
    .replace(/__(.+?)__/g,"$1").replace(/_(.+?)_/g,"$1").replace(/`{1,3}[^`]*`{1,3}/g,"")
    .replace(/\[([^\]]+)\]\([^)]+\)/g,"$1").replace(/^[-*•]\s+/gm,"")
    .replace(/^\d+\.\s+/gm,"").replace(/^>\s+/gm,"").replace(/[-]{2,}/g,", ")
    .replace(/\n{2,}/g,". ").replace(/\n/g," ").replace(/\s{2,}/g," ").trim();
  return applySanskrit(t);
}

  const btn=document.getElementById("gen-btn");const cl=getLM(medLevel);
  btn.disabled=true;document.getElementById("med-result").style.display="none";
  btn.innerHTML='<span style="display:flex;gap:6px;align-items:center"><span style="width:6px;height:6px;border-radius:50%;background:'+cl.color+';animation:bounce 1.3s ease infinite;display:inline-block"></span><span style="width:6px;height:6px;border-radius:50%;background:'+cl.color+';animation:bounce 1.3s ease infinite;animation-delay:0.22s;display:inline-block"></span><span style="width:6px;height:6px;border-radius:50%;background:'+cl.color+';animation:bounce 1.3s ease infinite;animation-delay:0.44s;display:inline-block"></span><span style="color:'+cl.color+'">Preparing guidance…</span></span>';
  const tokens=timerMins===0?600:timerMins<=5?700:timerMins<=10?1000:1400;
  const fetchWithTimeout = () => Promise.race([
    fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:getHeaders(),
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:tokens,system:medSystem(medLevel,medTrad,timerMins),
        messages:[{role:"user",content:"Guided meditation for a "+medLevel+" practitioner. Tradition: "+(medTrad==="all"?"all five traditions":getTM(medTrad).full)+"."+(timerMins>0?" Target: "+timerMins+" minutes.":"")}]})}),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error("Timed out — try again")),50000))
  ]);
  try{
    const r=await fetchWithTimeout();
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    medText=d.content?.[0]?.text||"";if(!medText)throw new Error("Empty response");
    document.getElementById("med-ready-label").textContent=getLM(medLevel).label+" guidance ready"+(timerMins>0?" · "+timerMins+" min":"");
    document.getElementById("med-text-preview").textContent=medText.replace(/\.{3,}/g," · · · ");
    document.getElementById("med-result").style.display="block";
  }catch(e){
    const msg=e.message?e.message.slice(0,60):"Could not generate. Try again.";
    document.getElementById("med-ready-label").textContent=msg;
    document.getElementById("med-ready-label").style.color="#c04040";
    document.getElementById("med-result").style.display="block";
  }finally{btn.disabled=false;renderMed();}
}

// ─── TAMBURA DRONE ────────────────────────────────────────────
let droneCtx=null,droneNodes=[],droneGain=null,droneActive=false;
const DRONE_TYPES={
  tambura:{freq:65.4,harmonics:[1,2,3,4,5,6,7,8],gains:[0.5,0.35,0.22,0.15,0.10,0.07,0.04,0.02],detune:[0,2,-1,3,-2,1,-3,2]},
  bowl:   {freq:432,harmonics:[1,2.76,5.1],gains:[0.45,0.25,0.12],detune:[0,1,-1]},
  nada:   {freq:82.4,harmonics:[1,2,3,4,5],gains:[0.4,0.28,0.18,0.10,0.05],detune:[0,-2,1,-1,2]},
};
let droneType="tambura",droneVol=0.18;

function startDrone(){
  if(droneActive)return;
  try{
    droneCtx=new(window.AudioContext||window.webkitAudioContext)();
    droneGain=droneCtx.createGain();droneGain.gain.setValueAtTime(0,droneCtx.currentTime);
    droneGain.gain.linearRampToValueAtTime(droneVol,droneCtx.currentTime+3);
    const filt=droneCtx.createBiquadFilter();filt.type="lowpass";filt.frequency.value=900;filt.Q.value=0.8;
    droneGain.connect(filt);filt.connect(droneCtx.destination);
    const dt=DRONE_TYPES[droneType];
    droneNodes=dt.harmonics.map((h,i)=>{
      const osc=droneCtx.createOscillator();const g=droneCtx.createGain();
      osc.type=i===0?"sawtooth":"sine";osc.frequency.value=dt.freq*h;osc.detune.value=dt.detune[i]||0;
      g.gain.value=dt.gains[i];osc.connect(g);g.connect(droneGain);osc.start();return{osc,g};
    });
    if(droneType==="tambura"){
      const lfo=droneCtx.createOscillator();const lfoG=droneCtx.createGain();
      lfo.frequency.value=0.4;lfoG.gain.value=0.015;
      lfo.connect(lfoG);lfoG.connect(droneGain.gain);lfo.start();droneNodes.push({osc:lfo,g:lfoG});
    }
    droneActive=true;updateDroneBtn();
  }catch(e){console.warn("Drone:",e);}
}
function stopDrone(){
  if(!droneActive||!droneCtx)return;
  try{
    droneGain.gain.linearRampToValueAtTime(0,droneCtx.currentTime+2);
    setTimeout(()=>{droneNodes.forEach(n=>{try{n.osc.stop();}catch(e){}});droneCtx.close();droneActive=false;droneNodes=[];updateDroneBtn();},2200);
  }catch(e){droneActive=false;updateDroneBtn();}
}
function toggleDrone(){if(droneActive)stopDrone();else startDrone();}
function setDroneType(type){
  droneType=type;
  document.querySelectorAll(".drone-type-btn").forEach(b=>{
    const a=b.dataset.type===type;const cl=getLM(medLevel);
    b.style.background=a?cl.color:"#fff8ee";b.style.borderColor=a?cl.color:"rgba(180,130,60,0.25)";b.style.color=a?"#fff":"#a08060";
  });
  if(droneActive){stopDrone();setTimeout(startDrone,2300);}
}
function setDroneVol(val){
  droneVol=parseFloat(val);
  document.getElementById("drone-vol-label").textContent=Math.round(droneVol*100/0.4)+"%";
  if(droneGain&&droneActive)droneGain.gain.setTargetAtTime(droneVol,droneCtx.currentTime,0.3);
}
function updateDroneBtn(){
  const btn=document.getElementById("drone-toggle-btn");if(!btn)return;
  const cl=getLM(medLevel);
  if(droneActive){btn.textContent="◼ Stop Drone";btn.style.background=cl.color;btn.style.color="#fff";btn.style.borderColor=cl.color;}
  else{btn.textContent="♪ Start Drone";btn.style.background="#fff8ee";btn.style.color="#a08060";btn.style.borderColor="rgba(180,130,60,0.25)";}
}

// ─── OPENAI TTS ENGINE ─────────────────────────────────────────
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function ttsChunk(text){
  if(!openaiKey)return null;
  const r=await fetch("https://api.openai.com/v1/audio/speech",{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+openaiKey},
    body:JSON.stringify({model:"tts-1-hd",voice:ttsVoice,input:text,speed:ttsSpeed,response_format:"mp3"})
  });
  if(!r.ok)throw new Error("OpenAI TTS: "+(await r.text()).slice(0,80));
  return URL.createObjectURL(await r.blob());
}
function browserSpeakText(text){
  return new Promise(res=>{
    const u=new SpeechSynthesisUtterance(applySanskrit(text));
    u.voice=voiceObj;u.rate=getLM(medLevel).rate;u.pitch=0.92;u.volume=0.95;
    u.onend=u.onerror=res;speechSynthesis.speak(u);
  });
}
// Shared audio context for playback (works inside iframes unlike new Audio())
let audioCtx=null;
let currentSource=null;

function getAudioCtx(){
  if(!audioCtx||audioCtx.state==="closed"){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}

async function ttsChunk(text){
  if(!openaiKey)return null;
  const r=await fetch("https://api.openai.com/v1/audio/speech",{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+openaiKey},
    body:JSON.stringify({model:"tts-1-hd",voice:ttsVoice,input:text,speed:ttsSpeed,response_format:"mp3"})
  });
  if(!r.ok)throw new Error("OpenAI TTS: "+(await r.text()).slice(0,80));
  return await r.arrayBuffer(); // return raw bytes, not blob URL
}

function playBuffer(arrayBuffer){
  return new Promise(async(res,rej)=>{
    try{
      const ctx=getAudioCtx();
      const decoded=await ctx.decodeAudioData(arrayBuffer.slice(0)); // slice to copy
      const source=ctx.createBufferSource();
      source.buffer=decoded;
      source.connect(ctx.destination);
      currentSource=source;
      source.onended=()=>{currentSource=null;res();};
      source.start(0);
    }catch(e){rej(e);}
  });
}

function stopCurrentAudio(){
  if(currentSource){
    try{currentSource.stop();}catch(e){}
    currentSource=null;
  }
}
function splitChunks(text,max){
  if(text.length<=max)return[text];
  const chunks=[];let cur="";
  const sents=text.match(/[^.!?]+[.!?]+\s*|[^.!?]+$/g)||[text];
  for(const s of sents){if((cur+s).length>max&&cur){chunks.push(cur.trim());cur=s;}else cur+=s;}
  if(cur.trim())chunks.push(cur.trim());return chunks;
}

function parseSegs(text){
  return text.split(/(\.\.{2,})/g).filter(Boolean).map(p=>{
    if(/^\.{6,}$/.test(p))return{text:null,ms:5500};
    if(/^\.{3,5}$/.test(p))return{text:null,ms:2200};
    const t=p.replace(/\s+/g," ").trim();return t?{text:t,ms:700}:null;
  }).filter(Boolean);
}

function startBreath(){
  setBreath("in");
  const cycle=()=>{setBreath("in");breathTimer=setTimeout(()=>{setBreath("out");breathTimer=setTimeout(cycle,5500);},4500);};
  cycle();
}
function setBreath(phase){
  const bc=document.getElementById("breath-circle"),bl=document.getElementById("breath-label");
  if(bl)bl.textContent=phase;
  if(bc)bc.style.animation=phase==="in"?"breathIn 4.5s ease-in-out forwards":"breathOut 5.5s ease-in-out forwards";
}
function stopBreath(){clearTimeout(breathTimer);}
function startCountdown(){
  if(timerMins===0)return;countdownSecs=timerMins*60;
  const disp=document.getElementById("timer-display");disp.style.display="block";
  const tick=()=>{
    if(!isSpeaking){disp.style.display="none";return;}
    const m=Math.floor(countdownSecs/60),s=countdownSecs%60;
    disp.textContent=m+":"+(s<10?"0"+s:s);if(countdownSecs<=0)return;
    countdownSecs--;countdownTimer=setTimeout(tick,1000);
  };tick();
}
function stopCountdown(){clearTimeout(countdownTimer);const d=document.getElementById("timer-display");if(d)d.style.display="none";}
function showBreathUI(show){
  document.getElementById("breath-section").style.display=show?"flex":"none";
  document.getElementById("med-config").style.display=show?"none":"block";
}

function stopSpeech(){
  ttsAborted=true;
  stopCurrentAudio();
  speechSynthesis.cancel();
  isSpeaking=false;isPaused=false;
  setSpeaking(false);stopBreath();stopCountdown();showBreathUI(false);stopDrone();
}
function setSpeaking(val){
  isSpeaking=val;showBreathUI(val);const b=document.getElementById("pause-btn");if(b)b.textContent="⏸ Pause";
}

async function runMeditation(segs){
  for(const seg of segs){
    if(ttsAborted)break;
    while(isPaused&&!ttsAborted)await sleep(200);
    if(ttsAborted)break;
    if(!seg.text){await sleep(seg.ms);continue;}
    try{
      if(openaiKey){
        const buf=await ttsChunk(seg.text);
        if(ttsAborted)break;
        while(isPaused&&!ttsAborted)await sleep(200);
        if(ttsAborted)break;
        await playBuffer(buf);
      }else{await browserSpeakText(seg.text);}
      if(!ttsAborted)await sleep(seg.ms);
    }catch(e){if(!ttsAborted)console.warn("TTS:",e);}
  }
  if(!ttsAborted){isSpeaking=false;setSpeaking(false);stopBreath();stopCountdown();stopDrone();}
}

async function speakMsg(idx){
  const msg=messages[idx];if(!msg||msg.role!=="assistant")return;
  const btn=document.getElementById("speak-"+idx);
  if(currentSpeakId===idx){
    ttsAborted=true;stopCurrentAudio();speechSynthesis.cancel();
    currentSpeakId=null;if(btn){btn.textContent="🔊 Listen";btn.classList.remove("speaking");}return;
  }
  ttsAborted=true;stopCurrentAudio();speechSynthesis.cancel();await sleep(80);
  if(currentSpeakId!==null){
    const old=document.getElementById("speak-"+currentSpeakId);
    if(old){old.textContent="🔊 Listen";old.classList.remove("speaking");}
  }
  currentSpeakId=idx;ttsAborted=false;
  if(btn){btn.textContent="◼ Stop";btn.classList.add("speaking");}
  const cleaned=cleanForSpeech(msg.content);
  try{
    if(openaiKey){
      for(const chunk of splitChunks(cleaned,900)){
        if(ttsAborted)break;
        const buf=await ttsChunk(chunk);
        if(ttsAborted)break;
        await playBuffer(buf);
      }
    }else{
      const u=new SpeechSynthesisUtterance(cleaned);
      u.voice=voiceObj;u.rate=0.9;u.pitch=0.95;u.volume=1;
      await new Promise(r=>{u.onend=u.onerror=r;speechSynthesis.speak(u);});
    }
  }catch(e){console.warn("Listen TTS:",e);}
  if(!ttsAborted){currentSpeakId=null;if(btn){btn.textContent="🔊 Listen";btn.classList.remove("speaking");}}
}

function beginSpeech(){
  if(!medText)return;
  stopSpeech();const segs=parseSegs(medText);
  isSpeaking=true;isPaused=false;ttsAborted=false;
  setSpeaking(true);startBreath();startCountdown();startDrone();
  sleep(2000).then(()=>{if(!ttsAborted)runMeditation(segs);});
}

function togglePause(){
  if(!isSpeaking)return;const btn=document.getElementById("pause-btn");
  if(!isPaused){
    isPaused=true;btn.textContent="▶ Resume";stopBreath();stopCountdown();
    if(currentSource){try{currentSource.stop();}catch(e){}}
    else speechSynthesis.pause();
    if(droneGain&&droneCtx)droneGain.gain.linearRampToValueAtTime(droneVol*0.35,droneCtx.currentTime+1.2);
  }else{
    isPaused=false;btn.textContent="⏸ Pause";startBreath();startCountdown();
    // runMeditation loop handles resume via isPaused check
    speechSynthesis.resume();
    if(droneGain&&droneCtx)droneGain.gain.linearRampToValueAtTime(droneVol,droneCtx.currentTime+1.2);
  }
}

function setMode(m){
  mode=m;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("active",b.dataset.mode===m));
  document.getElementById("inquiry-panel").style.display=m==="inquiry"?"flex":"none";
  document.getElementById("med-panel").style.display=m==="meditation"?"block":"none";
  if(m==="inquiry"){stopSpeech();renderInquiry();}else renderMed();
  renderTabs();
}
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}

document.getElementById("voice-bar").querySelector('input[type="range"]').value=ttsSpeed;
