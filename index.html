<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Darśana</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:radial-gradient(ellipse at 20% 10%,#1e0c35,#0d0818 55%,#050310);
    display:flex;align-items:center;justify-content:center;
    font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;padding:12px;color:#b5a5cb}
  #app{width:100%;max-width:720px;height:94vh;display:flex;flex-direction:column;
    background:rgba(10,6,20,0.97);border-radius:20px;border:1px solid rgba(160,100,50,0.18);
    overflow:hidden;box-shadow:0 0 100px rgba(100,50,180,0.1),0 40px 100px rgba(0,0,0,0.8)}
  /* Header */
  #header{padding:14px 20px 11px;border-bottom:1px solid rgba(140,90,40,0.12);
    background:linear-gradient(180deg,rgba(22,10,40,0.95),transparent);flex-shrink:0}
  #title-row{display:flex;align-items:center;gap:11px;margin-bottom:11px}
  #om-wrap{position:relative;width:38px;height:38px;flex-shrink:0}
  #om-ring{position:absolute;inset:0;background:conic-gradient(from 0deg,#d4a060,#9060c8,#c04060,#d08030,#5090d0,#4aaa8a,#d4a060);
    border-radius:50%;animation:spin 24s linear infinite}
  #om-inner{position:absolute;inset:2px;background:#0a0614;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:#d4a060}
  #title-text{flex:1}
  #title-text h1{color:#e8c078;font-size:17px;font-weight:700;letter-spacing:0.12em;font-variant:small-caps}
  #title-text p{color:#4a3465;font-size:9.5px;letter-spacing:0.07em;font-style:italic;margin-top:2px}
  #mode-toggle{display:flex;background:rgba(255,255,255,0.04);border-radius:20px;
    border:1px solid rgba(100,60,140,0.3);overflow:hidden}
  .mode-btn{padding:4px 10px;border:none;cursor:pointer;font-size:10px;font-family:Palatino,serif;
    background:transparent;color:#3a2860;transition:all 0.2s}
  .mode-btn.active{background:rgba(200,130,60,0.2);color:#d4a060}
  #tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center}
  #tabs::-webkit-scrollbar{display:none}
  .tab-label{color:#2e1f48;font-size:9px;letter-spacing:0.1em;white-space:nowrap;margin-right:3px;text-transform:uppercase}
  .tab-btn{padding:3px 9px;border-radius:20px;border:1px solid rgba(70,45,100,0.3);
    background:transparent;color:#3a2860;font-size:10px;font-family:Palatino,serif;
    cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.2s}
  /* Inquiry */
  #inquiry-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;
    gap:14px;min-height:0;scrollbar-width:thin;scrollbar-color:#1e1030 transparent}
  #inquiry-body::-webkit-scrollbar{width:3px}
  #inquiry-body::-webkit-scrollbar-thumb{background:#1e1030;border-radius:4px}
  .filter-banner{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:9px}
  .filter-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
  .filter-x{background:none;border:none;color:#3a2860;cursor:pointer;font-size:13px;margin-left:auto}
  .quote-box{text-align:center;padding:13px 15px;border-radius:13px}
  .quote-star{font-size:20px;opacity:0.4;margin-bottom:7px}
  .quote-text{font-size:13.5px;font-style:italic;line-height:1.7;opacity:0.85}
  .quote-src{font-size:10.5px;color:#3a2860;margin-top:6px}
  .section-label{color:#2e1f48;font-size:9px;letter-spacing:0.14em;text-align:center;text-transform:uppercase}
  .starter-btn{width:100%;background:transparent;border:1px solid transparent;border-radius:9px;
    padding:8px 13px;color:#6a5080;font-size:13px;font-family:Palatino,serif;cursor:pointer;
    text-align:left;font-style:italic;line-height:1.5;transition:all 0.2s;margin-bottom:2px;display:block}
  .msg-row{display:flex;gap:8px;align-items:flex-start;animation:fadeUp 0.3s ease}
  .msg-row.user{justify-content:flex-end}
  .msg-avatar{width:22px;height:22px;border-radius:50%;background:conic-gradient(from 0deg,#d4a060,#9060c8,#c04060,#d08030,#5090d0,#4aaa8a,#d4a060);
    flex-shrink:0;margin-top:3px;position:relative}
  .msg-avatar-inner{position:absolute;inset:2px;background:#0a0614;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:8px;color:#d4a060}
  .msg-bubble{max-width:83%;padding:10px 15px;font-size:13.5px;line-height:1.8;white-space:pre-wrap}
  .msg-bubble.assistant{background:rgba(18,10,32,0.98);border:1px solid rgba(70,45,100,0.35);
    color:#b5a5cb;border-radius:4px 15px 15px 15px}
  .msg-bubble.user{background:rgba(100,55,160,0.14);border:1px solid rgba(160,100,50,0.25);
    color:#c8a055;border-radius:15px 15px 4px 15px}
  .typing{padding:10px 15px;background:rgba(18,10,32,0.98);border:1px solid rgba(70,45,100,0.35);
    border-radius:4px 15px 15px 15px;display:flex;gap:6px;align-items:center}
  .dot{width:4px;height:4px;border-radius:50%;animation:bounce 1.3s ease infinite;opacity:0.7}
  #inquiry-input{padding:10px 16px 13px;border-top:1px solid rgba(140,90,40,0.1);
    background:rgba(6,4,14,0.9);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
  #msg-input{flex:1;background:rgba(18,10,30,0.95);border:1px solid rgba(70,45,100,0.35);
    border-radius:11px;padding:10px 13px;color:#b5a5cb;font-size:13.5px;font-family:Palatino,serif;
    font-style:italic;resize:none;outline:none;line-height:1.5;transition:border-color 0.2s}
  #msg-input::placeholder{color:#2e1f45;font-style:italic}
  #send-btn{width:38px;height:38px;border-radius:11px;border:none;flex-shrink:0;
    cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;color:#fff}
  /* Meditation */
  #med-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;
    gap:14px;min-height:0;scrollbar-width:thin;scrollbar-color:#1e1030 transparent}
  #med-body::-webkit-scrollbar{width:3px}
  #med-body::-webkit-scrollbar-thumb{background:#1e1030;border-radius:4px}
  .level-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .level-btn{padding:10px 12px;border-radius:11px;border:1px solid rgba(70,45,100,0.3);
    background:rgba(15,9,28,0.6);cursor:pointer;text-align:left;font-family:Palatino,serif;transition:all 0.2s}
  .level-icon{font-size:12px}
  .level-name{font-size:11px;font-weight:600}
  .level-desc{font-size:9.5px;line-height:1.5;font-style:italic;color:#4a3860;margin-top:3px}
  .lens-banner{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:9px;font-size:11px}
  #gen-btn{padding:11px;border-radius:13px;font-size:13px;font-family:Palatino,serif;
    font-style:italic;letter-spacing:0.05em;display:flex;align-items:center;justify-content:center;
    gap:9px;transition:all 0.2s;cursor:pointer;border:1px solid transparent}
  #med-result{border-radius:13px;background:rgba(15,9,28,0.7);padding:15px 17px;display:none}
  #med-result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  #begin-btn{padding:5px 15px;border-radius:20px;font-size:11px;font-family:Palatino,serif;
    letter-spacing:0.06em;display:flex;align-items:center;gap:5px;cursor:pointer;transition:all 0.2s}
  #med-text-preview{font-size:12.5px;line-height:1.85;font-style:italic;color:#7060a0;
    max-height:190px;overflow-y:auto;scrollbar-width:thin}
  #breath-section{display:flex;flex-direction:column;align-items:center;gap:13px;padding:6px 0;display:none}
  #breath-circle{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  #breath-label{font-size:10px;font-style:italic;opacity:0.6}
  .silence-quote{text-align:center;color:#2e1f48;font-size:11px;font-style:italic;line-height:1.8}
  .speech-controls{display:flex;gap:8px}
  .speech-btn{padding:5px 15px;border-radius:20px;font-size:11px;font-family:Palatino,serif;
    letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;border:1px solid transparent}
  /* Footer */
  #footer{padding:5px 18px;border-top:1px solid rgba(70,45,100,0.1);display:flex;gap:11px;
    overflow-x:auto;scrollbar-width:none;flex-shrink:0}
  #footer::-webkit-scrollbar{display:none}
  .foot-item{display:flex;align-items:center;gap:4px;white-space:nowrap;opacity:0.32}
  .foot-dot{width:4px;height:4px;border-radius:50%}
  .foot-label{font-size:9px}
  /* Animations */
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
  @keyframes breathIn{from{transform:scale(1);opacity:0.5}to{transform:scale(1.4);opacity:1}}
  @keyframes breathOut{from{transform:scale(1.4);opacity:1}to{transform:scale(0.85);opacity:0.4}}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div id="title-row">
      <div id="om-wrap">
        <div id="om-ring"></div>
        <div id="om-inner">ॐ</div>
      </div>
      <div id="title-text">
        <h1>Darśana</h1>
        <p>Iyengar · Kashmir Shaivism · Patañjali · Gurumayi · Vijñāna Bhairava</p>
      </div>
      <div id="mode-toggle">
        <button class="mode-btn active" data-mode="inquiry" onclick="setMode('inquiry')">◈ Inquiry</button>
        <button class="mode-btn" data-mode="meditation" onclick="setMode('meditation')">◉ Meditation</button>
      </div>
    </div>
    <div id="tabs">
      <span class="tab-label" id="tab-label">Filter ›</span>
    </div>
  </div>

  <!-- INQUIRY MODE -->
  <div id="inquiry-panel" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden">
    <div id="inquiry-body"></div>
    <div id="inquiry-input">
      <textarea id="msg-input" rows="1" placeholder="Bring your inquiry to Darśana…"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button id="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>

  <!-- MEDITATION MODE -->
  <div id="med-panel" style="display:none;flex:1;min-height:0;overflow:hidden">
    <div id="med-body">
      <!-- Breath section (shown while speaking) -->
      <div id="breath-section">
        <div id="breath-circle">
          <span id="breath-label">inhale</span>
        </div>
        <div class="silence-quote">"The silence between words<br/>is as important as the words."</div>
        <div class="speech-controls">
          <button class="speech-btn" id="pause-btn" onclick="togglePause()">⏸ pause</button>
          <button class="speech-btn" onclick="stopSpeech()" style="border-color:rgba(160,60,60,0.4);background:rgba(160,60,60,0.1);color:#c06060">◼ stop</button>
        </div>
      </div>
      <!-- Config (shown when not speaking) -->
      <div id="med-config">
        <div class="section-label" style="text-align:left;margin-bottom:8px">Practice Level</div>
        <div class="level-grid" id="level-grid"></div>
        <div id="lens-banner" class="lens-banner" style="display:none;margin-top:8px"></div>
        <button id="gen-btn" onclick="genMeditation()" style="margin-top:8px">
          <span id="gen-icon">◑</span><span id="gen-label">Generate Moderate Guidance</span>
        </button>
        <div id="med-result">
          <div id="med-result-header">
            <span id="med-ready-label" style="font-size:10.5px;font-style:italic;opacity:0.7"></span>
            <button id="begin-btn" onclick="beginSpeech()">▶ Begin</button>
          </div>
          <div id="med-text-preview"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer"></div>
</div>

<script>
const TRADITIONS = [
  {id:"all",      label:"All",       full:"All Traditions",   color:"#d4a060",icon:"◈"},
  {id:"iyengar",  label:"Iyengar",   full:"Iyengar Asana",    color:"#4aaa8a",icon:"❧"},
  {id:"kashmir",  label:"Kashmir",   full:"Kashmir Shaivism", color:"#9060c8",icon:"◎"},
  {id:"patanjali",label:"Patañjali", full:"Yoga Sūtras",      color:"#c04060",icon:"◉"},
  {id:"gurumayi", label:"Gurumayi",  full:"Siddha Yoga",      color:"#d08030",icon:"✿"},
  {id:"vbt",      label:"VBT",       full:"Vijñāna Bhairava", color:"#5090d0",icon:"∞"},
];
const LEVELS = [
  {id:"beginner",label:"Beginner",icon:"☽",color:"#8ab4d0",rate:0.82,desc:"New to stillness. Body unaccustomed to quiet."},
  {id:"moderate",label:"Moderate",icon:"◑",color:"#a0c890",rate:0.76,desc:"Years of practice. Prana is felt. Mind and thought are familiar."},
  {id:"advanced",label:"Advanced",icon:"◕",color:"#c8a060",rate:0.68,desc:"Sushumna accessible. Samadhi touches arise."},
  {id:"awakened",label:"Awakened",icon:"○",color:"#d4a0d0",rate:0.58,desc:"Pure Awareness rests as itself. Recognition is immediate."},
];
const QUOTES = {
  all:       ["The seeing, the seer, and what is seen — one Awareness at play.","— Darśana"],
  iyengar:   ["The body is the bow, asana is the arrow, and the soul is the target.","— B.K.S. Iyengar"],
  kashmir:   ["Consciousness contracts by its own free will — and by its own free will, recognizes itself.","— Pratyabhijñāhṛdayam"],
  patanjali: ["The Yoga Sūtras are not dry philosophy. They are a living map of inner transformation.","— Pandit Tigunait"],
  gurumayi:  ["Honor the Self. Worship the Self. Bow to the Self. God dwells within you as you.","— Gurumayi"],
  vbt:       ["Each dharana is not a technique to perfect but a doorway — step through, and you are home.","— Sally Kempton"],
};
const STARTERS = {
  all:       ["How do all five traditions understand grace in awakening?","How does Gurumayi's 'Honor the Self' relate to Ksemaraja's pratyabhijñā?","What connects Iyengar's asana, Patanjali's dharana, and a VBT dharana?"],
  iyengar:   ["What is the inner purpose of asana beyond the physical?","How does Iyengar connect asana to pratyahara and the inner limbs?","What does Iyengar mean by intelligence in every cell?"],
  kashmir:   ["What does Ksemaraja mean by recognition — pratyabhijñā?","How does Wallis explain Spanda — the sacred tremor of Awareness?","Why does Tantra embrace the world rather than renounce it?"],
  patanjali: ["What is Tigunait's Tantric reading of Ishvara-pranidhana?","How does Tigunait explain the five kleshas?","What is the relationship between abhyasa and vairagya?"],
  gurumayi:  ["What does Gurumayi teach about Shaktipat and the Siddha Guru?","How does Gurumayi's heart teaching connect to Kashmir Shaivism?","What is the yoga of discipline — how does it differ from austerity?"],
  vbt:       ["What is the practice of entering the gap between breaths?","How does Sally Kempton present the heart-space dharanas?","What does 'What remains?' mean as a dharana?"],
};
const FILTER = {
  iyengar:   "Respond ONLY through Iyengar's texts: Light on Yoga, Light on Life, Tree of Yoga, Core of the Yoga Sutras.",
  kashmir:   "Respond ONLY through Kashmir Shaivism: Ksemaraja's texts and Christopher Wallis (Recognition Sutras, Tantra Illuminated).",
  patanjali: "Respond ONLY through Tigunait's three-volume Yoga Sutra commentary.",
  gurumayi:  "Respond ONLY through Gurumayi's published teachings.",
  vbt:       "Respond ONLY through Sally Kempton's Doorways to the Infinite and the 112 VBT dharanas.",
};
const MED = {
  beginner:"BEGINNER: New to stillness. Body and breath only. No Sanskrit. Warm, patient. ~7 min.",
  moderate:"MODERATE: Feels prana. Guide asana-to-stillness, pratyahara, VBT breath-gap. Light Sanskrit. ~13 min.",
  advanced:"ADVANCED: Sushumna accessible. Guide kumbhaka, Spanda, dharana into dhyana. Full Sanskrit. Long silences. ~18 min.",
  awakened:"AWAKENED: Only non-dual pointers. Minimal words, mostly silence (...... ). 'What remains?' Do not instruct — invite recognition. ~4 min.",
};
const BASE_SYSTEM = `You are Darśana, a contemplative guide holding five traditions. Answer ONLY from these sources. If outside, redirect warmly.
IYENGAR: Asana as self-inquiry. Body as laboratory of Self. Sources: Light on Yoga, Light on Life, Tree of Yoga, Core of the Yoga Sutras. Emphasize pratyahara, dharana, asana as meditation in action, prana, bandhas.
KASHMIR SHAIVISM: Ksemaraja — Pratyabhijñāhṛdayam (all 20 sutras), Śiva Sūtra Vimarśinī, Spandanirṇaya. Christopher Wallis — The Recognition Sutras and Tantra Illuminated. Core: Cit-Śakti, Spanda, Vimarśa, Svātantrya, Māyā, 36 tattvas, Śaktipāta, pratyabhijñā as liberation itself.
PATANJALI via TIGUNAIT: Three volumes — Secret of the Yoga Sutra, Practice of the Yoga Sutra, Pursuit of Power and Freedom. Tantric undercurrent, kleshas, samyama, viveka-khyati, kaivalya.
GURUMAYI: Kindle My Heart, My Lord Loves a Pure Heart, Yoga of Discipline, Courage and Contentment, Enthusiasm. Śaktipāta, hrdaya, seva, Om Namah Shivaya, "Honor the Self."
VBT via SALLY KEMPTON: Doorways to the Infinite — 112 dharanas. Breath-gap, sky, heart-space, "What remains?", sensation/sound.
Bridge traditions actively. Cite sutras. Sanskrit with translation. Warm, precise, experiential.`;

let mode = "inquiry";
let chatTrad = "all";
let medTrad = "all";
let medLevel = "moderate";
let messages = [];
let medText = "";
let speechQueue = [];
let isSpeaking = false;
let isPaused = false;
let voiceObj = null;
let breathTimer = null;
let segTimer = null;
let breathPhase = "in";

// Init voices
function loadVoices() {
  const v = speechSynthesis.getVoices();
  if (!v.length) return;
  const names = ["Google UK English Female","Microsoft Hazel","Samantha","Karen","Moira","Tessa"];
  for (const n of names) { const f = v.find(x=>x.name.includes(n)); if(f){voiceObj=f;return;} }
  voiceObj = v.find(x=>x.lang.startsWith("en-GB")) || v.find(x=>x.lang.startsWith("en")) || v[0];
}
loadVoices();
speechSynthesis.addEventListener("voiceschanged", loadVoices);

function getTM(id){ return TRADITIONS.find(t=>t.id===id)||TRADITIONS[0]; }
function getLM(id){ return LEVELS.find(l=>l.id===id)||LEVELS[1]; }

function chatSystem(trad) {
  if(trad==="all") return BASE_SYSTEM;
  return BASE_SYSTEM+`\n\nACTIVE FILTER — ${getTM(trad).full} only. ${FILTER[trad]}`;
}
function medSystem(level, trad) {
  const tNote = trad==="all" ? "Weave all five traditions." : `Primary lens: ${getTM(trad).full}. ${FILTER[trad]}`;
  return `You are Darśana giving oral guided meditation spoken aloud.\nSTRICT FORMAT:\n- Flowing spoken prose ONLY — no markdown, asterisks, headers, bullets\n- "..." = 2-second pause\n- "......" = 5-second silence\n- Short rhythmic sentences. Max 500 words. Economy is reverence.\n- Close gently.\nVOICE: Intimate. Warm. Assertive. Present.\n${MED[level]}\n${tNote}\nBegin now.`;
}

// Render tabs
function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = `<span class="tab-label" id="tab-label">${mode==="inquiry"?"Filter":"Lens"} ›</span>`;
  TRADITIONS.forEach(t => {
    const active = mode==="inquiry" ? chatTrad===t.id : medTrad===t.id;
    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.textContent = t.icon+" "+t.label;
    btn.style.cssText = active
      ? `border-color:${t.color}70;background:${t.color}1e;color:${t.color}`
      : "";
    btn.onclick = () => {
      if(mode==="inquiry") { chatTrad=t.id; renderInquiry(); }
      else { medTrad=t.id; renderMed(); }
      renderTabs();
    };
    tabsEl.appendChild(btn);
  });
}

// Render footer
function renderFooter() {
  const f = document.getElementById("footer");
  f.innerHTML = TRADITIONS.filter(t=>t.id!=="all").map(t=>
    `<div class="foot-item"><div class="foot-dot" style="background:${t.color}"></div><span class="foot-label" style="color:${t.color}">${t.full}</span></div>`
  ).join("");
}

// Render inquiry home
function renderInquiry() {
  const body = document.getElementById("inquiry-body");
  if (messages.length > 0) { renderMessages(); return; }
  const ct = getTM(chatTrad);
  const cc = ct.color;
  const [q,qs] = QUOTES[chatTrad];
  let html = "";
  if (chatTrad!=="all") {
    html += `<div class="filter-banner" style="background:${cc}10;border:1px solid ${cc}25">
      <div class="filter-dot" style="background:${cc}"></div>
      <span style="color:${cc};font-size:11px;flex:1">Responding through ${ct.full} only</span>
      <button class="filter-x" onclick="chatTrad='all';renderInquiry();renderTabs()">✕</button>
    </div>`;
  }
  html += `<div class="quote-box" style="background:${cc}08;border:1px solid ${cc}18">
    <div class="quote-star" style="color:${cc}">✦</div>
    <div class="quote-text" style="color:${cc}">"${q}"</div>
    <div class="quote-src">${qs}</div>
  </div>
  <div class="section-label">Begin your inquiry</div>`;
  STARTERS[chatTrad].forEach(s => {
    html += `<button class="starter-btn" style="background:${cc}09;border-color:${cc}1a"
      onmouseover="this.style.background='${cc}1c';this.style.color='${cc}'"
      onmouseout="this.style.background='${cc}09';this.style.color='#6a5080'"
      onclick="document.getElementById('msg-input').value=this.dataset.s;document.getElementById('msg-input').dispatchEvent(new Event('input'))"
      data-s="${s.replace(/"/g,'&quot;')}">
      <span style="color:${cc};opacity:0.5;margin-right:7px">${ct.icon}</span>${s}
    </button>`;
  });
  body.innerHTML = html;
  updateSendBtn();
}

function renderMessages() {
  const cc = getTM(chatTrad).color;
  const body = document.getElementById("inquiry-body");
  let html = "";
  messages.forEach(m => {
    if (m.role==="user") {
      html += `<div class="msg-row user"><div class="msg-bubble user">${escHtml(m.content)}</div></div>`;
    } else {
      html += `<div class="msg-row">
        <div class="msg-avatar"><div class="msg-avatar-inner">ॐ</div></div>
        <div class="msg-bubble assistant">${escHtml(m.content)}</div>
      </div>`;
    }
  });
  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;
  updateSendBtn();
}

function addTyping() {
  const cc = getTM(chatTrad).color;
  const body = document.getElementById("inquiry-body");
  const div = document.createElement("div");
  div.id = "typing-indicator";
  div.className = "msg-row";
  div.innerHTML = `<div class="msg-avatar"><div class="msg-avatar-inner">ॐ</div></div>
    <div class="typing">
      <div class="dot" style="background:${cc};animation-delay:0s"></div>
      <div class="dot" style="background:${cc};animation-delay:0.22s"></div>
      <div class="dot" style="background:${cc};animation-delay:0.44s"></div>
    </div>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if(el) el.remove();
}

function updateSendBtn() {
  const val = document.getElementById("msg-input").value.trim();
  const btn = document.getElementById("send-btn");
  const cc = getTM(chatTrad).color;
  btn.style.background = val ? `conic-gradient(from 90deg,${cc},#9060c8,${cc})` : "rgba(25,14,44,0.7)";
  btn.style.color = val ? "#fff" : "#2a1848";
  btn.style.cursor = val ? "pointer" : "not-allowed";
}

document.getElementById("msg-input").addEventListener("input", updateSendBtn);
document.getElementById("msg-input").addEventListener("focus", function(){
  this.style.borderColor = getTM(chatTrad).color+"55";
});
document.getElementById("msg-input").addEventListener("blur", function(){
  this.style.borderColor = "rgba(70,45,100,0.35)";
});

async function sendMsg() {
  const inp = document.getElementById("msg-input");
  const text = inp.value.trim();
  if (!text) return;
  messages.push({role:"user",content:text});
  inp.value = ""; inp.style.height = "auto";
  renderMessages();
  addTyping();
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1400,
        system:chatSystem(chatTrad),messages})
    });
    const d = await r.json();
    removeTyping();
    messages.push({role:"assistant",content:d.content?.[0]?.text||"Unable to respond."});
    renderMessages();
  } catch(e) {
    removeTyping();
    messages.push({role:"assistant",content:"Something went wrong. Please try again."});
    renderMessages();
  }
}

// Meditation render
function renderMed() {
  const cl = getLM(medLevel);
  const mt = getTM(medTrad);
  // Level grid
  const grid = document.getElementById("level-grid");
  grid.innerHTML = LEVELS.map(lv => {
    const active = medLevel===lv.id;
    return `<button class="level-btn" onclick="medLevel='${lv.id}';renderMed()"
      style="${active?`border-color:${lv.color}60;background:${lv.color}14`:''}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span class="level-icon" style="color:${lv.color}">${lv.icon}</span>
        <span class="level-name" style="color:${active?lv.color:'#8070a0'}">${lv.label}</span>
      </div>
      <div class="level-desc">${lv.desc}</div>
    </button>`;
  }).join("");
  // Lens banner
  const lb = document.getElementById("lens-banner");
  if (medTrad!=="all") {
    lb.style.display="flex";
    lb.style.cssText+=`;background:${mt.color}10;border:1px solid ${mt.color}25;color:${mt.color}`;
    lb.innerHTML = `${mt.icon} Guided through ${mt.full}`;
  } else { lb.style.display="none"; }
  // Gen button
  const genBtn = document.getElementById("gen-btn");
  genBtn.style.cssText = `border-color:${cl.color}40;background:linear-gradient(135deg,${cl.color}18,${cl.color}08);color:${cl.color}`;
  document.getElementById("gen-icon").textContent = cl.icon;
  document.getElementById("gen-label").textContent = `Generate ${cl.label} Guidance${medTrad!=="all"?" · "+mt.label:""}`;
  // Begin btn color
  const bb = document.getElementById("begin-btn");
  bb.style.cssText = `border:1px solid ${cl.color}55;background:${cl.color}22;color:${cl.color}`;
  // Ready label
  document.getElementById("med-ready-label").style.color = cl.color;
  // Breath circle
  const bc = document.getElementById("breath-circle");
  bc.style.cssText = `width:84px;height:84px;border-radius:50%;border:1px solid ${cl.color}40;background:radial-gradient(circle,${cl.color}28,${cl.color}06);display:flex;align-items:center;justify-content:center`;
  document.getElementById("breath-label").style.color = cl.color;
  // Pause btn
  document.getElementById("pause-btn").style.cssText = `border-color:${cl.color}50;background:${cl.color}18;color:${cl.color}`;
}

async function genMeditation() {
  stopSpeech();
  const btn = document.getElementById("gen-btn");
  const cl = getLM(medLevel);
  btn.disabled = true;
  btn.innerHTML = `<span style="display:flex;gap:6px;align-items:center">
    <span style="width:5px;height:5px;border-radius:50%;background:${cl.color};animation:bounce 1.3s ease infinite;display:inline-block;opacity:0.5"></span>
    <span style="width:5px;height:5px;border-radius:50%;background:${cl.color};animation:bounce 1.3s ease infinite;animation-delay:0.22s;display:inline-block;opacity:0.5"></span>
    <span style="width:5px;height:5px;border-radius:50%;background:${cl.color};animation:bounce 1.3s ease infinite;animation-delay:0.44s;display:inline-block;opacity:0.5"></span>
    <span>Preparing your guidance…</span>
  </span>`;
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1400,
        system:medSystem(medLevel,medTrad),
        messages:[{role:"user",content:`Generate oral guided meditation for ${medLevel} practitioner. Tradition: ${medTrad==="all"?"all five":getTM(medTrad).full}.`}]})
    });
    const d = await r.json();
    medText = d.content?.[0]?.text || "Unable to generate.";
    document.getElementById("med-ready-label").textContent = getLM(medLevel).label+" guidance ready";
    document.getElementById("med-text-preview").textContent = medText.replace(/\.{3,}/g," · · · ");
    document.getElementById("med-result").style.display = "block";
  } catch(e) { medText="Something went wrong."; }
  finally {
    btn.disabled = false;
    renderMed();
  }
}

// Speech engine
function parseSegs(text) {
  return text.split(/(\.{3,})/g).filter(Boolean).map(p => {
    if(/^\.{6,}$/.test(p)) return {text:null,ms:5500};
    if(/^\.{3,5}$/.test(p)) return {text:null,ms:2200};
    const t = p.replace(/\s+/g," ").trim();
    return t ? {text:t,ms:700} : null;
  }).filter(Boolean);
}

function startBreath() {
  setBreath("in");
  const cycle = () => {
    setBreath("in");
    breathTimer = setTimeout(()=>{ setBreath("out"); breathTimer=setTimeout(cycle,5500); },4500);
  };
  cycle();
}

function setBreath(phase) {
  breathPhase = phase;
  const bc = document.getElementById("breath-circle");
  const bl = document.getElementById("breath-label");
  if(bl) bl.textContent = phase;
  if(bc) bc.style.animation = phase==="in" ? "breathIn 4.5s ease-in-out forwards" : "breathOut 5.5s ease-in-out forwards";
}

function stopBreath() { clearTimeout(breathTimer); }

function showBreathUI(show) {
  document.getElementById("breath-section").style.display = show ? "flex" : "none";
  document.getElementById("med-config").style.display = show ? "none" : "block";
}

function stopSpeech() {
  speechSynthesis.cancel();
  clearTimeout(segTimer);
  speechQueue = [];
  isSpeaking = false; isPaused = false;
  setSpeaking(false);
  stopBreath();
  showBreathUI(false);
}

function setSpeaking(val) {
  isSpeaking = val;
  showBreathUI(val);
  document.getElementById("pause-btn").textContent = "⏸ pause";
}

function speakNext() {
  if(!isSpeaking||isPaused) return;
  const seg = speechQueue.shift();
  if(!seg){ isSpeaking=false; setSpeaking(false); stopBreath(); return; }
  if(!seg.text){ segTimer=setTimeout(speakNext,seg.ms); return; }
  const u = new SpeechSynthesisUtterance(seg.text);
  u.voice = voiceObj;
  u.rate = getLM(medLevel).rate;
  u.pitch = 0.9; u.volume = 1;
  u.onend = ()=>{ if(isSpeaking&&!isPaused) setTimeout(speakNext,seg.ms); };
  u.onerror = ()=>{ isSpeaking=false; setSpeaking(false); stopBreath(); };
  speechSynthesis.speak(u);
}

function beginSpeech() {
  if(!medText) return;
  stopSpeech();
  speechQueue = parseSegs(medText);
  isSpeaking = true; isPaused = false;
  setSpeaking(true);
  startBreath();
  speakNext();
}

function togglePause() {
  if(!isSpeaking) return;
  const btn = document.getElementById("pause-btn");
  if(!isPaused){
    speechSynthesis.pause(); isPaused=true; btn.textContent="▶ resume"; stopBreath();
  } else {
    speechSynthesis.resume(); isPaused=false; btn.textContent="⏸ pause"; speakNext(); startBreath();
  }
}

function setMode(m) {
  mode = m;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("active",b.dataset.mode===m));
  document.getElementById("inquiry-panel").style.display = m==="inquiry"?"flex":"none";
  document.getElementById("med-panel").style.display = m==="meditation"?"block":"none";
  if(m==="inquiry"){ stopSpeech(); renderInquiry(); }
  else renderMed();
  renderTabs();
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

// Init
renderTabs();
renderFooter();
renderInquiry();
updateSendBtn();
</script>
